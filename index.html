<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>KNIGHT FIGHT Game</title>
  <meta name="description" content="A browser-based 2D fighting game with cinematic intro, sprite animations, AI opponent, and parallax backgrounds.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- PC keyboard cheatsheet — hidden by default, shown only at fight start on PC -->
  <div id="controls-bar">
    <div class="ctrl-group">
      <span class="ctrl-key">WASD / ←→↑↓</span><span class="ctrl-desc">Move</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-key">Space</span><span class="ctrl-desc">Roll</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-key">J</span><span class="ctrl-desc">Light</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-key">K</span><span class="ctrl-desc">Heavy</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-key">L</span><span class="ctrl-desc">Combo</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-key">Shift</span><span class="ctrl-desc">Block</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-key">Esc</span><span class="ctrl-desc">Pause</span>
    </div>
  </div>

  <!-- Mobile controls are injected dynamically by MobileControls.js -->

  <script type="module" src="src/main.js"></script>
</body>
</html>
